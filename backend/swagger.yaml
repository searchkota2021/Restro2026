openapi: 3.0.0
info:
  title: RestroOS API
  description: Complete REST API for the RestroOS Point of Sale & Restaurant Management System.
  version: 1.0.0
servers:
  - url: https://restro-2026-git-main-searchkotas-projects.vercel.app/api
    description: Vercel Production Server
  - url: http://localhost:3000/api
    description: Local Development Server

security:
  - VercelSSOCookie: []

tags:
  - name: Dashboard
  - name: Orders & KOT
  - name: Menu Catalog
  - name: Floors & Tables
  - name: Inventory
  - name: CRM
  - name: Operations & Configs

paths:
  # ==============================
  # 1. DASHBOARD
  # ==============================
  /dashboard:
    get:
      tags: [Dashboard]
      summary: Get live dashboard summary
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'

  # ==============================
  # 2. ORDERS & KOT
  # ==============================
  /orders/place:
    post:
      tags: [Orders & KOT]
      summary: Place an order and fire KOT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                table_id: { type: string }
                order_type: { type: string, enum: [dinein, takeaway, delivery] }
                items: { type: array, items: { type: object } }
                total: { type: number }
      responses:
        '200': { description: Order placed successfully }

  /orders/settle:
    post:
      tags: [Orders & KOT]
      summary: Settle a bill
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                order_id: { type: string }
                table_id: { type: string }
                items: { type: array, items: { type: object } }
                total: { type: number }
      responses:
        '200': { description: Bill settled successfully }

  /kots:
    get:
      tags: [Orders & KOT]
      summary: Get all pending KOTs
      responses:
        '200': { description: Successful response }

  /kots/{id}/ready:
    put:
      tags: [Orders & KOT]
      summary: Mark a KOT as ready
      parameters:
        - $ref: '#/components/parameters/IdParam'
      responses:
        '200': { description: Marked as ready }

  # ==============================
  # 3. MENU CATALOG (Items, Categories, Groups)
  # ==============================
  /items:
    get:
      tags: [Menu Catalog]
      summary: Get all items
      responses:
        '200': { description: Successful response }
    post:
      tags: [Menu Catalog]
      summary: Create a new item
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } }
      responses:
        '201': { description: Created }

  /items/{id}:
    put:
      tags: [Menu Catalog]
      summary: Update an item
      parameters: [ $ref: '#/components/parameters/IdParam' ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } }
      responses:
        '200': { description: Updated }
    delete:
      tags: [Menu Catalog]
      summary: Delete an item
      parameters: [ $ref: '#/components/parameters/IdParam' ]
      responses:
        '200': { description: Deleted }

  /categories:
    get:
      tags: [Menu Catalog]
      summary: Get all categories
      responses: { '200': { description: Success } }
    post:
      tags: [Menu Catalog]
      summary: Create category
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } } }
      responses: { '201': { description: Created } }
  /categories/{id}:
    delete:
      tags: [Menu Catalog]
      summary: Delete category (Fails if items are linked)
      parameters: [ $ref: '#/components/parameters/IdParam' ]
      responses: { '200': { description: Deleted }, '400': { description: Relational safeguard triggered } }

  /groups:
    get:
      tags: [Menu Catalog]
      summary: Get all menu groups
      responses: { '200': { description: Success } }
    post:
      tags: [Menu Catalog]
      summary: Create group
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } } }
      responses: { '201': { description: Created } }
  /groups/{id}:
    delete:
      tags: [Menu Catalog]
      summary: Delete group (Fails if categories are linked)
      parameters: [ $ref: '#/components/parameters/IdParam' ]
      responses: { '200': { description: Deleted }, '400': { description: Relational safeguard triggered } }

  # ==============================
  # 4. FLOORS & TABLES
  # ==============================
  /floors:
    get:
      tags: [Floors & Tables]
      summary: Get all floors
      responses: { '200': { description: Success } }
    post:
      tags: [Floors & Tables]
      summary: Create floor
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } } }
      responses: { '201': { description: Created } }
  /floors/{id}:
    delete:
      tags: [Floors & Tables]
      summary: Delete floor (Fails if tables are linked)
      parameters: [ $ref: '#/components/parameters/IdParam' ]
      responses: { '200': { description: Deleted } }

  /tables:
    get:
      tags: [Floors & Tables]
      summary: Get all tables
      responses: { '200': { description: Success } }
    post:
      tags: [Floors & Tables]
      summary: Create table
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } } }
      responses: { '201': { description: Created } }
  /tables/{id}:
    delete:
      tags: [Floors & Tables]
      summary: Delete table
      parameters: [ $ref: '#/components/parameters/IdParam' ]
      responses: { '200': { description: Deleted } }

  # ==============================
  # 5. INVENTORY & CRM
  # ==============================
  /inventory:
    get:
      tags: [Inventory]
      summary: Get all stock
      responses: { '200': { description: Success } }
    post:
      tags: [Inventory]
      summary: Add stock
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } } }
      responses: { '201': { description: Created } }
  
  /customers:
    get:
      tags: [CRM]
      summary: Get all customers
      responses: { '200': { description: Success } }
    post:
      tags: [CRM]
      summary: Add customer
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } } }
      responses: { '201': { description: Created } }

  # ==============================
  # 6. OPERATIONS & CONFIGS
  # ==============================
  # (These follow the exact same CRUD pattern)
  /expenses:
    get: { tags: [Operations & Configs], summary: Get expenses, responses: { '200': { description: Success } } }
    post: { tags: [Operations & Configs], summary: Add expense, requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } } }, responses: { '201': { description: Created } } }
  
  /feedback:
    get: { tags: [Operations & Configs], summary: Get feedback, responses: { '200': { description: Success } } }
    post: { tags: [Operations & Configs], summary: Add feedback, requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } } }, responses: { '201': { description: Created } } }

  /staff:
    get: { tags: [Operations & Configs], summary: Get staff, responses: { '200': { description: Success } } }
    post: { tags: [Operations & Configs], summary: Add staff, requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } } }, responses: { '201': { description: Created } } }

  /taxes:
    get: { tags: [Operations & Configs], summary: Get taxes, responses: { '200': { description: Success } } }
    post: { tags: [Operations & Configs], summary: Add tax, requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/GenericPayload' } } } }, responses: { '201': { description: Created } } }

components:
  securitySchemes:
    VercelSSOCookie:
      type: apiKey
      in: cookie
      name: _vercel_jwt
      description: Vercel SSO Authentication JWT Cookie required to bypass deployment protection.

  parameters:
    IdParam:
      name: id
      in: path
      required: true
      description: Unique Identifier of the resource
      schema:
        type: string

  schemas:
    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          description: Payload containing the requested array or object
    
    GenericPayload:
      type: object
      description: Dynamic JSON object representing the database entity (Item, Table, Floor, etc.)
      additionalProperties: true
